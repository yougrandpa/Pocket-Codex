version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pocket_codex
      POSTGRES_USER: pocket
      POSTGRES_PASSWORD: pocket
    ports:
      - "5432:5432"
    volumes:
      - pocket_codex_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - pocket_codex_redis:/data

volumes:
  pocket_codex_pgdata:
  pocket_codex_redis:
